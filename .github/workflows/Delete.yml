name: Delete

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 3'

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Delete Workflow Runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ RELEASES_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 0
